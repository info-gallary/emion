[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "emion"
version = "0.0.1"
description = "A custom Python module for ION-DTN"
readme = "README.md"
authors = [
  { name = "Author Name", email = "author@example.com" },
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
requires-python = ">=3.7"

[project.urls]
"Homepage" = "https://github.com/example/emion"
"Bug Tracker" = "https://github.com/example/emion/issues"

[tool.setuptools.packages.find]
where = ["src"]

[project.optional-dependencies]
dev = [
    "pytest",
    "mkdocs",
    "mkdocs-material",
    "mkdocstrings[python]",
]
