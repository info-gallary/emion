<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EmION — BPv7 Mission Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <!-- D3.js for high-performance visualization -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body class="mission-control">
    <div class="dashboard-grid">
        <!-- Sidebar: Orchestration -->
        <aside class="sidebar">
            <div class="brand">
                <h1>⚛ Em<span class="accent">ION</span></h1>
                <span class="protocol">BPv7 Core</span>
            </div>

            <nav class="nav-section">
                <h3>🛰 Network</h3>
                <div class="control-group">
                    <input type="number" id="input-node-id" placeholder="Node ID" min="1">
                    <button id="btn-add-node" class="btn-primary">Register</button>
                    <div id="node-chips" class="chip-container"></div>
                </div>
                <div class="control-actions">
                    <button id="btn-start" class="btn-accent w-full">Initialize Core</button>
                    <button id="btn-stop" class="btn-danger w-full">Emergency Stop</button>
                </div>
            </nav>

            <nav class="nav-section">
                <h3>🚀 BPv7 Dispatch</h3>
                <div class="control-form">
                    <div class="input-row">
                        <input type="number" id="input-src" placeholder="Src">
                        <input type="number" id="input-dst" placeholder="Dst">
                    </div>
                    <input type="text" id="input-payload" placeholder="Payload" value="MISSION_B_V7">
                    <button id="btn-send" class="btn-accent w-full">Dispatch Bundle</button>
                </div>
            </nav>

            <nav class="nav-section">
                <h3>🧠 Plug-ins</h3>
                <div class="control-form">
                    <input type="text" id="input-mod-url" placeholder="http://local:8421">
                    <input type="text" id="input-mod-targets" placeholder="Nodes (e.g. 1,2)">
                    <button id="btn-connect-mod" class="btn-secondary w-full">Attach API</button>
                </div>
                <div id="module-list" class="plugin-list"></div>
            </nav>

            <div class="system-health">
                <div class="health-item">
                    <span>WS Link:</span>
                    <span id="ws-status" class="status-dot"></span>
                </div>
            </div>
        </aside>

        <!-- Main Workspace: Topology -->
        <section class="workspace">
            <div class="card viz-card">
                <div class="card-header">
                    <h2>Live Topology <small>Bundle Protocol v7 Animation</small></h2>
                </div>
                <div id="viz-container">
                    <canvas id="topology-canvas"></canvas>
                </div>
            </div>

            <div class="card history-card">
                <div class="card-header">
                    <h2>Mission History <small>Bundle Transit Log</small></h2>
                </div>
                <div class="history-table-wrapper">
                    <table id="bundle-history">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Source</th>
                                <th>Dest</th>
                                <th>Size</th>
                                <th>Status</th>
                                <th>Modules</th>
                            </tr>
                        </thead>
                        <tbody id="history-body"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Right Panel: Advanced Analytics -->
        <aside class="analytics">
            <div class="card chart-card">
                <div class="card-header"><h2>Memory (SDR)</h2></div>
                <div id="chart-sdr" class="d3-chart"></div>
            </div>
            
            <div class="card chart-card">
                <div class="card-header"><h2>Throughput <small>BPv7 Bps</small></h2></div>
                <div id="chart-flow" class="d3-chart"></div>
            </div>

            <div class="card log-card">
                <div class="card-header"><h2>System Engine Log</h2></div>
                <div id="event-log" class="console-log"></div>
            </div>
        </aside>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
